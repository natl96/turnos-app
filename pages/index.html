<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnos PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Archivo', -apple-system, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    
    :root {
      --primary: #EC0000;
      --primary-dark: #C00000;
      --secondary: #0057B8;
      --accent: #00B140;
      --dark: #0A1428;
    }

    body {
      background: linear-gradient(135deg, var(--dark) 0%, #1A2337 100%);
      min-height: 100vh;
      overflow-y: auto; /* ✅ Scroll con rueda del ratón */
    }

    .service-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 3px solid transparent;
    }
    .service-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 25px 50px -12px rgba(236, 0, 0, 0.4);
    }
    .service-card.active {
      border-color: #0057B8;
      box-shadow: 0 0 0 6px rgba(0, 87, 184, 0.3);
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .ticket-number {
      font-size: 5.5rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -6px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    @keyframes popIn {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="text-white">

  <!-- HEADER -->
  <header class="glass border-b border-white/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-8 py-6 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-4xl shadow-inner">📋</div>
        <div>
          <h1 class="text-4xl font-bold tracking-tighter">Turnos PRO</h1>
          <p class="text-blue-200 text-sm">Gestión omnicanal de turnos</p>
        </div>
      </div>

      <!-- Cambio de idioma (REQ-09) -->
      <div class="flex bg-white/10 rounded-3xl p-1">
        <button onclick="switchLanguage('es')" id="lang-es" class="px-8 py-3 rounded-3xl font-semibold">🇨🇴 ES</button>
        <button onclick="switchLanguage('en')" id="lang-en" class="px-8 py-3 rounded-3xl font-semibold">🇬🇧 EN</button>
      </div>

      <a href="../login" class="inline-flex items-center gap-3 bg-white text-blue-700 px-8 py-4 rounded-3xl font-semibold hover:bg-blue-50 transition-all shadow-lg">
        <i class="fa-solid fa-right-to-bracket"></i>
        Iniciar sesión (Asesor / Admin)
      </a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-8 py-12">
    <div class="text-center mb-12">
      <h2 class="text-5xl font-bold mb-3" id="hero-title">¿Qué servicio necesitas hoy?</h2>
      <p class="text-xl text-blue-200" id="hero-subtitle">Selecciona y obtén tu turno en segundos</p>
    </div>

    <!-- SERVICIOS (REQ-01) -->
    <div id="services-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16"></div>

    <!-- PANEL GENERACIÓN -->
    <div id="generation-panel" class="hidden glass rounded-3xl p-8 max-w-2xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-2xl font-semibold" id="selected-label">Servicio seleccionado:</h3>
        <div id="selected-service-name" class="text-3xl font-bold text-blue-400"></div>
      </div>

      <!-- Ticket impreso / digital (REQ-02) -->
      <div class="flex gap-4 mb-8">
        <label onclick="selectDelivery('impreso')" id="label-impreso" class="flex-1 cursor-pointer glass rounded-3xl p-6 flex items-center gap-4 border-2 border-transparent">
          <i class="fa-solid fa-print text-4xl text-red-400"></i>
          <div>
            <p class="font-semibold text-xl" id="physical-text">Ticket impreso</p>
            <p class="text-sm text-white/70" id="physical-desc">Se imprime en el kiosco</p>
          </div>
        </label>
        <label onclick="selectDelivery('digital')" id="label-digital" class="flex-1 cursor-pointer glass rounded-3xl p-6 flex items-center gap-4 border-2 border-transparent">
          <i class="fa-solid fa-mobile-screen-button text-4xl text-emerald-400"></i>
          <div>
            <p class="font-semibold text-xl" id="digital-text">Ticket digital</p>
            <p class="text-sm text-white/70" id="digital-desc">Por WhatsApp / Email</p>
          </div>
        </label>
      </div>

      <!-- Datos digitales (REQ-10) -->
      <div id="digital-fields" class="hidden space-y-6">
        <div>
          <label class="block text-sm mb-2 text-white/70" id="phone-label">Teléfono <span class="text-red-400">*</span></label>
          <input type="tel" id="phone" placeholder="300 123 4567" class="w-full bg-white/10 border border-white/30 focus:border-red-400 rounded-3xl px-6 py-5 text-xl outline-none">
        </div>
        <div>
          <label class="block text-sm mb-2 text-white/70" id="email-label">Correo electrónico (opcional)</label>
          <input type="email" id="email" placeholder="tu@email.com" class="w-full bg-white/10 border border-white/30 focus:border-red-400 rounded-3xl px-6 py-5 text-xl outline-none">
        </div>
      </div>

      <button onclick="generateTicket()" class="w-full mt-4 py-7 bg-red-600 hover:bg-red-700 text-2xl font-semibold rounded-3xl transition-all flex items-center justify-center gap-3">
        <i class="fa-solid fa-ticket"></i>
        <span id="generate-btn">Generar turno</span>
      </button>
    </div>
  </main>

  <!-- MODAL DEL TICKET (REQ-03, REQ-06, REQ-08) -->
  <div id="ticket-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
    <div class="bg-white text-gray-900 rounded-3xl max-w-lg w-full overflow-hidden shadow-2xl animate-popIn">
      <div class="p-10 text-center" id="ticket-content"></div>
      <div class="flex border-t border-gray-200">
        <button onclick="cancelTicket()" class="flex-1 py-6 text-red-600 font-semibold flex items-center justify-center gap-2 hover:bg-red-50">Cancelar turno</button>
        <button onclick="closeTicketModal()" class="flex-1 py-6 bg-red-600 text-white font-semibold flex items-center justify-center gap-2">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- QR MÓVIL FLOTANTE (REQ-06) -->
  <div class="fixed bottom-8 right-8 glass rounded-3xl p-5 text-center shadow-2xl">
    <p class="text-xs uppercase tracking-widest mb-2 text-blue-200">Escanea desde tu celular</p>
    <div id="mobile-qr"></div>
  </div>

  <script>
    let language = 'es';
    let selectedService = null;
    let selectedDeliveryType = 'impreso';
    let currentTicket = null;
    let inactivityTimer = null;

    const translations = {
      es: {
        heroTitle: "¿Qué servicio necesitas hoy?",
        heroSubtitle: "Selecciona y obtén tu turno en segundos",
        selectedLabel: "Servicio seleccionado:",
        physicalText: "Ticket impreso",
        physicalDesc: "Se imprime en el kiosco",
        digitalText: "Ticket digital",
        digitalDesc: "Por WhatsApp / Email",
        phoneLabel: "Teléfono (obligatorio para digital)",
        emailLabel: "Correo electrónico (opcional)",
        generateBtn: "Generar turno",
        ticketReady: "¡Tu turno ha sido generado!",
        peopleAhead: "Personas delante",
        waitTime: "Tiempo estimado",
        minutes: "minutos",
        date: "Fecha y hora:"
      },
      en: {
        heroTitle: "What service do you need today?",
        heroSubtitle: "Select and get your ticket in seconds",
        selectedLabel: "Selected service:",
        physicalText: "Printed ticket",
        physicalDesc: "Printed at the kiosk",
        digitalText: "Digital ticket",
        digitalDesc: "Via WhatsApp / Email",
        phoneLabel: "Phone (required for digital)",
        emailLabel: "Email (optional)",
        generateBtn: "Generate ticket",
        ticketReady: "Your ticket is ready!",
        peopleAhead: "People ahead",
        waitTime: "Estimated time",
        minutes: "minutes",
        date: "Date & time:"
      }
    };

    function translatePage() {
      document.getElementById('hero-title').textContent = translations[language].heroTitle;
      document.getElementById('hero-subtitle').textContent = translations[language].heroSubtitle;
      document.getElementById('selected-label').textContent = translations[language].selectedLabel;
      document.getElementById('physical-text').textContent = translations[language].physicalText;
      document.getElementById('physical-desc').textContent = translations[language].physicalDesc;
      document.getElementById('digital-text').textContent = translations[language].digitalText;
      document.getElementById('digital-desc').textContent = translations[language].digitalDesc;
      document.getElementById('phone-label').textContent = translations[language].phoneLabel;
      document.getElementById('email-label').textContent = translations[language].emailLabel;
      document.getElementById('generate-btn').textContent = translations[language].generateBtn;
    }

    function switchLanguage(lang) {
      language = lang;
      document.getElementById('lang-es').classList.toggle('bg-white', lang === 'es');
      document.getElementById('lang-es').classList.toggle('text-blue-700', lang === 'es');
      document.getElementById('lang-en').classList.toggle('bg-white', lang === 'en');
      document.getElementById('lang-en').classList.toggle('text-blue-700', lang === 'en');
      translatePage();
    }

    async function loadServices() {
      try {
        const res = await fetch('/api/estado');
        const data = await res.json();
        const grid = document.getElementById('services-grid');
        grid.innerHTML = data.services.filter(s => s.active).map(s => `
          <div onclick="selectService('${s.id}', '${s.name}', '${s.color}')" 
               class="service-card bg-white text-gray-900 rounded-3xl p-8 cursor-pointer text-center">
            <div class="w-20 h-20 mx-auto mb-6 rounded-2xl flex items-center justify-center text-6xl" style="background: #FF69B4; color: white;">📌</div>
            <h3 class="text-2xl font-bold mb-1">${s.name}</h3>
            <p class="text-gray-500">${s.estimatedMinutes} min aprox.</p>
          </div>
        `).join('');
      } catch (e) {
        console.error(e);
      }
    }

    function selectService(id, name, color) {
      selectedService = { id, name, color };
      document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
      event.currentTarget.classList.add('active');
      document.getElementById('generation-panel').classList.remove('hidden');
      document.getElementById('selected-service-name').innerHTML = `<span style="color:${color}">${name}</span>`;
      selectDelivery('impreso');
      resetInactivityTimer();
    }

    function selectDelivery(type) {
      selectedDeliveryType = type;
      document.getElementById('label-impreso').classList.toggle('border-red-500', type === 'impreso');
      document.getElementById('label-digital').classList.toggle('border-red-500', type === 'digital');
      document.getElementById('digital-fields').classList.toggle('hidden', type !== 'digital');
    }

    async function generateTicket() {
      if (!selectedService) return alert('Selecciona un servicio');

      const isDigital = selectedDeliveryType === 'digital';
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();

      if (isDigital && (!phone || !/^\+?[\d\s-]{8,15}$/.test(phone))) {
        return alert(language === 'es' ? 'Ingresa un teléfono válido' : 'Enter a valid phone');
      }

      try {
        const res = await fetch('/api/turnos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            serviceId: selectedService.id,
            channel: 'kiosco',
            deliveryType: selectedDeliveryType,
            phone: isDigital ? phone : '',
            email: isDigital ? email : '',
            language: language
          })
        });

        const result = await res.json();

        if (result.success && result.ticket) {
          currentTicket = result.ticket;
          showTicketModal(result.ticket);
        } else {
          alert(result.message || 'No se pudo generar el ticket');
        }
      } catch (e) {
        console.error(e);
        alert('Error de conexión');
      }
    }

    function showTicketModal(ticket) {
      const content = document.getElementById('ticket-content');
      const t = translations[language];

      const qrCanvas = document.createElement('canvas');
      QRCode.toCanvas(qrCanvas, ticket.id, { width: 220, margin: 2 });

      content.innerHTML = `
        <div class="text-center">
          <div class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-2 rounded-3xl mb-6 text-lg font-semibold">
            <i class="fa-solid fa-check-circle"></i> ${t.ticketReady}
          </div>
          <div class="ticket-number mono">${ticket.id}</div>
          <p class="text-3xl font-semibold mt-4 mb-8">${selectedService.name}</p>
          <div class="grid grid-cols-2 gap-6 mb-10">
            <div class="bg-gray-100 rounded-3xl p-6">
              <p class="text-sm text-gray-500">${t.peopleAhead}</p>
              <p class="text-5xl font-bold text-blue-700">${ticket.peopleAhead}</p>
            </div>
            <div class="bg-gray-100 rounded-3xl p-6">
              <p class="text-sm text-gray-500">${t.waitTime}</p>
              <p class="text-5xl font-bold text-red-600">${ticket.estimatedWaitMinutes} ${t.minutes}</p>
            </div>
          </div>
          <div class="mb-8">
            <p class="text-sm text-gray-500 mb-2">${t.date}</p>
            <p class="font-mono text-xl">${new Date(ticket.queueEnteredAt).toLocaleString(language === 'es' ? 'es-CO' : 'en-US')}</p>
          </div>
          <div class="flex justify-center">${qrCanvas.outerHTML}</div>
        </div>
      `;

      document.getElementById('ticket-modal').classList.remove('hidden');
      resetInactivityTimer();
    }

    async function cancelTicket() {
      if (!currentTicket) return;
      if (!confirm(language === 'es' ? '¿Cancelar este turno?' : 'Cancel ticket?')) return;
      await fetch(`/api/turnos/${currentTicket.id}/cancelar`, { method: 'POST' });
      closeTicketModal();
    }

    function closeTicketModal() {
      document.getElementById('ticket-modal').classList.add('hidden');
      currentTicket = null;
      document.getElementById('generation-panel').classList.add('hidden');
      selectedService = null;
      loadServices();
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => window.location.reload(), 15000);
    }

    function createMobileQR() {
      const container = document.getElementById('mobile-qr');
      QRCode.toCanvas(container, window.location.origin, { width: 160 });
    }

    window.onload = () => {
      loadServices();
      createMobileQR();
      translatePage();
      resetInactivityTimer();
      document.addEventListener('click', resetInactivityTimer);
    };
  </script>
</body>
</html>
