<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TURNOS PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .ticket-number { font-size: 5rem; line-height: 1; font-weight: 700; letter-spacing: -6px; }
    .service-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .service-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-950 to-gray-900 text-white min-h-screen overflow-hidden">
  <!-- HEADER -->
  <div class="bg-white/10 backdrop-blur-md border-b border-white/10">
    <div class="max-w-7xl mx-auto px-8 py-6 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center text-3xl shadow-inner">📋</div>
        <div>
          <h1 class="text-3xl font-bold tracking-tight">Turnos PRO</h1>
          <p class="text-blue-200 text-sm">Gestión omnicanal de turnos</p>
        </div>
      </div>
      <a href="/login" class="flex items-center gap-3 bg-white text-blue-700 px-8 py-4 rounded-3xl font-semibold hover:bg-blue-50 transition-all shadow-lg text-lg">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Iniciar sesión (Admin / Asesor)</span>
      </a>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-8 py-12">
    <h2 class="text-5xl font-bold text-center mb-2">¿Qué servicio necesitas hoy?</h2>
    <p class="text-center text-blue-200 mb-12 text-xl">Selecciona y obtén tu turno en segundos</p>

    <!-- SERVICIOS -->
    <div id="services-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16"></div>

    <!-- TICKET DIGITAL -->
    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 max-w-xl mx-auto">
      <h3 class="text-2xl font-semibold mb-6 flex items-center gap-3">
        <i class="fa-solid fa-mobile-screen-button"></i> ¿Prefieres ticket digital?
      </h3>
      <form id="digital-form" class="space-y-6">
        <input type="tel" id="phone" placeholder="Teléfono (opcional)" 
               class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-5 text-white placeholder:text-white/50 focus:outline-none focus:border-emerald-400">
        <input type="email" id="email" placeholder="Correo electrónico (opcional)"
               class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-5 text-white placeholder:text-white/50 focus:outline-none focus:border-emerald-400">
        <button type="button" onclick="takeDigitalTicket()" 
                class="w-full py-6 bg-emerald-500 hover:bg-emerald-600 text-xl font-semibold rounded-3xl transition-all">
          Solicitar ticket digital
        </button>
      </form>
    </div>
  </div>

  <!-- MODAL TICKET -->
  <div id="ticket-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="bg-white text-gray-900 rounded-3xl max-w-lg w-full mx-4 overflow-hidden shadow-2xl">
      <div class="p-10 text-center" id="ticket-content"></div>
      <div class="flex border-t divide-x">
        <button onclick="closeModal()" class="flex-1 py-6 text-lg font-medium text-gray-500 hover:bg-gray-100">Cerrar</button>
        <button onclick="closeModal()" class="flex-1 py-6 text-lg font-semibold bg-blue-600 text-white hover:bg-blue-700">Nuevo turno</button>
      </div>
    </div>
  </div>

  <script>
    let inactivityTimer;

    async function loadServices() {
      try {
        const res = await fetch('/api/estado');
        const data = await res.json();
        const grid = document.getElementById('services-grid');
        grid.innerHTML = data.services
          .filter(s => s.active)
          .map(s => `
            <div onclick="takeTicket('${s.id}', '${s.name}')" 
                 class="service-card bg-white text-gray-900 rounded-3xl p-8 cursor-pointer text-center">
              <div class="w-20 h-20 mx-auto mb-6 rounded-2xl flex items-center justify-center text-5xl"
                   style="background: ${s.color}20; color: ${s.color}">📌</div>
              <h3 class="text-2xl font-semibold">${s.name}</h3>
              <p class="text-gray-500 mt-2">${s.estimatedMinutes} min aprox.</p>
            </div>
          `).join('');
      } catch (e) {
        console.error("Error cargando servicios", e);
      }
    }

    async function takeTicket(serviceId, serviceName) {
      if (!confirm(`¿Deseas tomar un turno para ${serviceName}?`)) return;
      
      try {
        const res = await fetch('/api/turnos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            serviceId: serviceId,
            channel: 'kiosco',
            deliveryType: 'impreso'
          })
        });
        const result = await res.json();
        
        if (result.success) {
          showTicketModal(result.ticket, serviceName);
        } else {
          alert(result.message || 'No se pudo generar el ticket');
        }
      } catch (e) {
        alert('Error de conexión. Intenta nuevamente.');
      }
    }

    async function takeDigitalTicket() {
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      if (!phone && !email) {
        alert('Ingresa al menos teléfono o correo');
        return;
      }
      try {
        const res = await fetch('/api/turnos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            serviceId: 'cuentas',
            channel: 'web',
            deliveryType: 'digital',
            phone: phone,
            email: email
          })
        });
        const result = await res.json();
        if (result.success) {
          showTicketModal(result.ticket, 'Ticket Digital');
        } else {
          alert(result.message || 'No se pudo generar el ticket');
        }
      } catch (e) {
        alert('Error de conexión.');
      }
    }

    function showTicketModal(ticket, serviceName) {
      const content = document.getElementById('ticket-content');
      content.innerHTML = `
        <h2 class="text-4xl font-bold text-emerald-600 mb-4">¡Tu turno ha sido generado!</h2>
        <div class="ticket-number text-blue-600 mb-6">${ticket.id}</div>
        <p class="text-3xl mb-8">${serviceName}</p>
        <div class="bg-gray-100 rounded-2xl p-6 text-left space-y-6">
          <div>
            <p class="text-sm text-gray-500">Personas delante</p>
            <p class="font-bold text-5xl">${ticket.peopleAhead}</p>
          </div>
          <div>
            <p class="text-sm text-gray-500">Tiempo estimado</p>
            <p class="font-bold text-5xl">${ticket.estimatedWaitMinutes} minutos</p>
          </div>
        </div>
      `;
      document.getElementById('ticket-modal').classList.remove('hidden');
      resetInactivityTimer();
    }

    function closeModal() {
      document.getElementById('ticket-modal').classList.add('hidden');
      loadServices();
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        window.location.reload(); // REQ-05: Reinicio automático
      }, 15000);
    }

    // Iniciar
    window.onload = () => {
      loadServices();
      resetInactivityTimer();
      document.addEventListener('click', resetInactivityTimer);
    };
  </script>
</body>
</html>
