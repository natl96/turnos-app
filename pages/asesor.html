<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Asesor – TurnoFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --ink: #0a0a0f;
    --paper: #f5f3ee;
    --accent: #2b7a78;
    --red: #e63946;
    --gold: #f4a261;
    --muted: #6b6b7b;
    --border: #e0ddd6;
    --card: #fff;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#0e1117;color:#f0f0f5;min-height:100vh;display:flex;flex-direction:column;}

  /* LOGIN */
  .login-wrapper {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0e1117;
    background-image: radial-gradient(ellipse at 30% 50%, rgba(43,122,120,.15) 0%, transparent 60%);
  }
  .login-card {
    background:#16181f; border:1px solid #2a2d38;
    border-radius:24px; padding:2.5rem; width:380px;
    box-shadow:0 30px 80px rgba(0,0,0,.4);
  }
  .login-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; margin-bottom:.25rem; }
  .login-logo span { color:#2b7a78; }
  .login-sub { font-size:.85rem; color:#666; margin-bottom:2rem; }
  .login-form label { display:block; font-size:.82rem; font-weight:600; color:#aaa; margin-bottom:.4rem; }
  .login-form input {
    width:100%; padding:.8rem 1rem; border-radius:12px;
    background:#0e1117; border:1.5px solid #2a2d38; color:#f0f0f5;
    font-family:'DM Sans',sans-serif; font-size:.95rem; outline:none;
    margin-bottom:1rem; transition:border-color .2s;
  }
  .login-form input:focus { border-color:#2b7a78; }
  .login-btn {
    width:100%; padding:.9rem; background:#2b7a78; color:#fff;
    border:none; border-radius:12px; font-weight:600; font-size:.95rem;
    cursor:pointer; transition:background .2s;
  }
  .login-btn:hover { background:#1f5e5c; }
  .login-error { color:#e63946; font-size:.82rem; margin-top:.5rem; display:none; }

  /* PANEL PRINCIPAL */
  .panel { display:none; flex-direction:column; height:100vh; }
  .panel.show { display:flex; }

  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding:.9rem 2rem; background:#16181f; border-bottom:1px solid #2a2d38;
    flex-shrink:0;
  }
  .topbar-left { display:flex; align-items:center; gap:1rem; }
  .topbar-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; }
  .topbar-logo span { color:#2b7a78; }
  .modulo-badge {
    background:#2b7a78; color:#fff;
    padding:.35rem .9rem; border-radius:20px;
    font-size:.8rem; font-weight:600;
  }
  .asesor-name { font-size:.85rem; color:#888; }

  .content {
    display:grid; grid-template-columns:1fr 360px;
    gap:0; flex:1; overflow:hidden;
  }

  .main-panel {
    padding:2rem; overflow-y:auto;
    border-right:1px solid #2a2d38;
  }

  .turno-actual {
    background:linear-gradient(135deg,#1a3a39 0%,#162e2d 100%);
    border:1px solid #2b7a78;
    border-radius:20px; padding:2rem;
    margin-bottom:2rem;
    position:relative;
  }
  .ta-label { font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:#4d9d9a; margin-bottom:.75rem; }
  .ta-code {
    font-family:'Syne',sans-serif; font-size:3.5rem; font-weight:800;
    line-height:1; letter-spacing:-3px; color:#fff; margin-bottom:.25rem;
  }
  .ta-service { font-size:.95rem; color:#aaa; margin-bottom:1.5rem; }
  .ta-meta { display:flex; gap:1.5rem; margin-bottom:1.75rem; }
  .ta-meta-item { display:flex; flex-direction:column; gap:.2rem; }
  .ta-meta-key { font-size:.72rem; color:#666; text-transform:uppercase; letter-spacing:.08em; }
  .ta-meta-val { font-size:.9rem; font-weight:600; }

  .btn-action {
    display:inline-flex; align-items:center; gap:.5rem;
    padding:.65rem 1.25rem; border-radius:12px; border:none;
    font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:600;
    cursor:pointer; transition:all .2s;
  }
  .btn-green { background:#2b7a78; color:#fff; }
  .btn-green:hover { background:#1f5e5c; }
  .btn-red { background:rgba(230,57,70,.15); color:#e63946; border:1px solid rgba(230,57,70,.3); }
  .btn-red:hover { background:#e63946; color:#fff; }
  .btn-gold { background:rgba(244,162,97,.15); color:#f4a261; border:1px solid rgba(244,162,97,.3); }
  .btn-gold:hover { background:#f4a261; color:#fff; }

  .cola-panel {
    display:flex; flex-direction:column; overflow:hidden;
  }
  .cola-header {
    padding:1.25rem 1.5rem; border-bottom:1px solid #2a2d38;
    display:flex; align-items:center; justify-content:space-between;
  }
  .cola-list { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.6rem; }
  .cola-item {
    background:#16181f; border:1px solid #2a2d38; border-radius:12px;
    padding:1rem 1.25rem; display:flex; align-items:center; gap:1rem;
  }
  .cola-num {
    font-family:'Syne',sans-serif; font-weight:800; font-size:.85rem;
    color:#2b7a78; min-width:60px;
  }

  @media(max-width:900px){
    .content{grid-template-columns:1fr;}
    .cola-panel{display:none;}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrapper" id="login-wrapper">
  <div class="login-card">
    <div class="login-logo">Turno<span>Flow</span></div>
    <div class="login-sub">Panel de Asesor</div>
    <div class="login-form">
      <label>Número de módulo</label>
      <input type="text" id="inp-modulo" placeholder="Ej: 1, 2, 3..." maxlength="3">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
      <button class="login-btn" onclick="login()">Ingresar al módulo</button>
      <div class="login-error" id="login-error">Módulo o contraseña incorrectos</div>
    </div>
    <p style="text-align:center;font-size:.75rem;color:#444;margin-top:1.5rem">
      <a href="/pages/index.html" style="color:#2b7a78;text-decoration:none">← Volver al inicio</a>
    </p>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Turno<span>Flow</span></div>
      <div class="modulo-badge">Módulo <span id="show-modulo">—</span></div>
      <div class="asesor-name" id="show-asesor">Asesor</div>
    </div>
    <div class="topbar-right">
      <button class="btn-action btn-gold" id="btn-pausa" onclick="togglePausa()">⏸ Pausa</button>
      <button class="btn-action btn-gray" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <!-- IZQUIERDO -->
    <div class="main-panel">
      <div id="turno-container">
        <div class="empty-state" id="empty-state">
          <p>No hay turno activo.<br>Presiona <strong>Llamar siguiente</strong> para comenzar.</p>
        </div>
        <div class="turno-actual" id="turno-actual" style="display:none">
          <div class="ta-label">Turno en atención</div>
          <div class="ta-code" id="ta-code">—</div>
          <div class="ta-service" id="ta-service">—</div>
          <div class="ta-meta">
            <div class="ta-meta-item">
              <span class="ta-meta-key">Cliente</span>
              <span class="ta-meta-val" id="ta-nombre">—</span>
            </div>
            <div class="ta-meta-item">
              <span class="ta-meta-key">Hora llamado</span>
              <span class="ta-meta-val" id="ta-hora">—</span>
            </div>
          </div>
          <div style="display:flex;gap:1rem">
            <button class="btn-action btn-green" onclick="finalizarAtencion()">✓ Finalizar</button>
            <button class="btn-action btn-gold" onclick="rellamarTurno()">📢 Rellamar</button>
            <button class="btn-action btn-red" onclick="marcarAusente()">✗ Ausente</button>
          </div>
        </div>
      </div>

      <button class="btn-action btn-green" id="btn-llamar" onclick="llamarSiguiente()" style="width:100%;margin-top:2rem;padding:1rem;font-size:1.1rem">
        ▶ Llamar siguiente turno
      </button>
    </div>

    <!-- DERECHO – COLA -->
    <div class="cola-panel">
      <div class="cola-header">
        <h2>Cola de espera</h2>
        <span class="cola-count" id="cola-count">0</span>
      </div>
      <div class="cola-list" id="cola-list"></div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
const socket = io();

let moduloNum = null;
let turnoActual = null;

async function login() {
  const modulo = document.getElementById('inp-modulo').value.trim();
  const password = document.getElementById('inp-pass').value;

  try {
    const r = await fetch(`${API}/api/asesor/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ modulo, password })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);

    moduloNum = modulo;
    document.getElementById('show-modulo').textContent = modulo;
    document.getElementById('show-asesor').textContent = data.asesor?.nombre || 'Asesor';
    document.getElementById('login-wrapper').style.display = 'none';
    document.getElementById('panel').classList.add('show');
    loadCola();
  } catch(e) {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = e.message || 'Error al ingresar';
  }
}

function logout() {
  if (!confirm('¿Cerrar sesión?')) return;
  document.getElementById('panel').classList.remove('show');
  document.getElementById('login-wrapper').style.display = 'flex';
  turnoActual = null;
}

async function loadCola() {
  try {
    const r = await fetch(`${API}/api/asesor/cola`);
    const lista = await r.json();
    renderCola(lista);
  } catch(e) {}
}

function renderCola(lista) {
  const el = document.getElementById('cola-list');
  document.getElementById('cola-count').textContent = lista.length;
  if (!lista.length) {
    el.innerHTML = '<div style="text-align:center;color:#555;padding:2rem">Sin turnos en espera</div>';
    return;
  }
  el.innerHTML = lista.map(t => `
    <div class="cola-item">
      <div class="cola-num">${t.id}</div>
      <div>${t.serviceName || 'Servicio'}</div>
    </div>
  `).join('');
}

async function llamarSiguiente() {
  if (turnoActual) return alert('Ya tienes un turno activo');
  try {
    const r = await fetch(`${API}/api/asesor/llamar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ modulo: moduloNum })
    });
    const data = await r.json();
    if (!data.ok) throw new Error(data.error);
    turnoActual = data.turno;
    document.getElementById('ta-code').textContent = turnoActual.id;
    document.getElementById('ta-service').textContent = turnoActual.serviceName;
    document.getElementById('turno-actual').style.display = 'block';
    document.getElementById('empty-state').style.display = 'none';
  } catch(e) {
    alert(e.message || 'No hay turnos en espera');
  }
}

async function finalizarAtencion() {
  if (!turnoActual) return;
  await fetch(`${API}/api/asesor/finalizar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ turnoId: turnoActual.id, modulo: moduloNum })
  });
  turnoActual = null;
  document.getElementById('turno-actual').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  loadCola();
}

async function rellamarTurno() {
  if (!turnoActual) return;
  await fetch(`${API}/api/asesor/rellamar`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ turnoId: turnoActual.id, modulo: moduloNum })
  });
}

async function marcarAusente() {
  if (!turnoActual) return;
  await fetch(`${API}/api/asesor/ausente`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ turnoId: turnoActual.id, modulo: moduloNum })
  });
  turnoActual = null;
  document.getElementById('turno-actual').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  loadCola();
}

async function togglePausa() {
  // Si tu backend tiene esta ruta, la puedes implementar más adelante
  alert('Función de pausa en desarrollo');
}

window.onload = () => {
  // Nada por ahora
};
</script>
</body>
</html>
