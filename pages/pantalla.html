<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pantalla de Espera – TurnoFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #060810;
    --panel: #0d1117;
    --border: #1a1f2e;
    --accent: #00d4aa;
    --gold: #ffb347;
    --text: #e8eaf0;
    --muted: #4a5068;
  }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    margin: 0;
  }
  .screen-wrap {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 2rem;
    gap: 1.5rem;
  }
  .top-bar { display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; }
  .logo span { color: var(--accent); }
  .clock { font-size: 2.3rem; color: var(--accent); }
  .main-area { display: grid; grid-template-columns: 1fr 340px; gap: 1.5rem; }
  .called-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; }
  .called-item {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.3rem 1.8rem; display: flex; gap: 1.5rem;
  }
  .called-num { font-family: 'Syne', sans-serif; font-size: 2.8rem; font-weight: 800; color: var(--accent); min-width: 140px; }
  .info-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
  .total-num { font-family: 'Syne', sans-serif; font-size: 4rem; font-weight: 800; color: var(--gold); }
  .flash {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,212,170,.12); pointer-events: none; opacity: 0;
    transition: opacity .2s;
  }
  .flash.show { opacity: 1; }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<div class="screen-wrap">
  <div class="top-bar">
    <div><div class="logo">Turno<span>Flow</span></div></div>
    <div>
      <div class="clock" id="clock">00:00</div>
      <div id="date-str" style="font-size:0.8rem;color:var(--muted);text-align:right"></div>
    </div>
  </div>

  <div class="main-area">
    <div>
      <div style="font-size:0.7rem;letter-spacing:1px;color:var(--muted);margin-bottom:8px">ÚLTIMOS TURNOS LLAMADOS</div>
      <div class="called-list" id="called-list"></div>
    </div>

    <div>
      <div class="info-card">
        <div style="font-size:0.7rem;letter-spacing:1px;color:var(--muted)">TOTAL EN ESPERA</div>
        <div class="total-num" id="total-espera">0</div>
      </div>
      <div class="info-card" style="margin-top:1rem">
        <div style="font-size:0.7rem;letter-spacing:1px;color:var(--muted);margin-bottom:10px">COLA POR SERVICIO</div>
        <div id="srv-list"></div>
      </div>
    </div>
  </div>

  <div style="text-align:center;font-size:0.85rem;color:var(--muted)">
    TurnoFlow • Actualización en tiempo real
  </div>
</div>

<script>
const socket = io();

console.log("Pantalla de espera cargada - esperando conexión...");

// ====================== RELOJ ======================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('date-str').textContent = now.toLocaleDateString('es-CO', { weekday: 'long', day: 'numeric', month: 'long' });
}
updateClock();
setInterval(updateClock, 1000);

// ====================== RENDER ======================
function renderLlamados(llamados) {
  const container = document.getElementById('called-list');
  if (!llamados || llamados.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:#666;padding:3rem">No hay turnos llamados aún</div>`;
    return;
  }
  container.innerHTML = llamados.slice(0, 6).map(t => `
    <div class="called-item">
      <div class="called-num">${t.id || t.codigo}</div>
      <div>
        <div style="font-size:0.9rem">${t.serviceName || t.servicioNombre || 'Servicio'}</div>
        <div style="color:#aaa;font-size:0.8rem">Módulo ${t.modulo || '01'}</div>
      </div>
    </div>
  `).join('');
}

function renderServicios(servicios) {
  const container = document.getElementById('srv-list');
  container.innerHTML = (servicios || []).map(s => `
    <div style="margin:8px 0;display:flex;justify-content:space-between">
      <span>${s.name || s.nombre}</span>
      <span style="font-weight:700;color:var(--accent)">${s.enEspera || s.esperando || 0}</span>
    </div>
  `).join('');
}

// Flash y sonido
function flashScreen() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 600);
}

function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [659, 784, 880].forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.frequency.value = freq;
      g.gain.value = 0.25;
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + i * 0.1);
      o.stop(ctx.currentTime + i * 0.1 + 0.25);
    });
  } catch(e) {}
}

// ====================== SOCKET.IO ======================
socket.on('connect', () => {
  console.log("✅ Socket.IO conectado correctamente");
});

socket.on('disconnect', () => {
  console.log("❌ Socket.IO desconectado");
});

socket.on('estado', (data) => {
  console.log("📡 Recibido estado:", data);
  document.getElementById('total-espera').textContent = data.totalEsperando || data.esperando || 0;
  renderServicios(data.servicios || data.services || []);
  renderLlamados(data.ultimosLlamados || []);
});

socket.on('nuevo-turno', (data) => {
  console.log("📨 Nuevo turno creado:", data);
  flashScreen();
  fetch('/api/estado').then(r => r.json()).then(d => {
    document.getElementById('total-espera').textContent = d.totalEsperando || 0;
    renderServicios(d.servicios || []);
  });
});

socket.on('turno-llamado', (data) => {
  console.log("🛎️ Turno llamado:", data);
  flashScreen();
  playChime();
  fetch('/api/estado').then(r => r.json()).then(d => renderLlamados(d.ultimosLlamados || []));
});

// ====================== RESPALDO ======================
setInterval(() => {
  fetch('/api/estado')
    .then(r => r.json())
    .then(data => {
      document.getElementById('total-espera').textContent = data.totalEsperando || 0;
      renderServicios(data.servicios || []);
      renderLlamados(data.ultimosLlamados || []);
    })
    .catch(() => console.log("Error en respaldo"));
}, 5000);

// Carga inicial
fetch('/api/estado')
  .then(r => r.json())
  .then(data => {
    console.log("📥 Datos iniciales recibidos:", data);
    document.getElementById('total-espera').textContent = data.totalEsperando || 0;
    renderServicios(data.servicios || []);
    renderLlamados(data.ultimosLlamados || []);
  })
  .catch(err => console.error("Error carga inicial:", err));
</script>
</body>
</html>
