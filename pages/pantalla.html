<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pantalla de Espera - Turnos PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .turno-grande { font-size: 7rem; line-height: 1; font-weight: 700; letter-spacing: -8px; }
    .marquee { animation: marquee 25s linear infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 to-gray-900 text-white min-h-screen overflow-hidden flex flex-col">
  <!-- HEADER -->
  <div class="bg-white/10 backdrop-blur-md border-b border-white/10 py-4">
    <div class="max-w-7xl mx-auto px-8 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <div class="text-4xl">📋</div>
        <div>
          <h1 class="text-4xl font-bold">Turnos PRO</h1>
          <p class="text-blue-200">Estamos aquí para atenderte</p>
        </div>
      </div>
      <div id="current-time" class="text-3xl font-mono font-semibold"></div>
    </div>
  </div>

  <div class="flex-1 flex">
    <!-- TURNO ACTUAL -->
    <div class="flex-1 flex flex-col items-center justify-center border-r border-white/10 p-12">
      <p class="uppercase tracking-[4px] text-emerald-400 text-xl font-semibold mb-4">AHORA LLAMANDO</p>
      <div id="current-ticket" class="turno-grande text-emerald-400 mb-6">CT-000</div>
      <div id="current-service" class="text-5xl font-semibold text-white"></div>
      <div class="mt-8 flex items-center gap-3 bg-emerald-500/20 text-emerald-400 px-8 py-3 rounded-3xl text-xl">
        <i class="fa-solid fa-bell animate-pulse"></i>
        <span id="current-module">Ventanilla 03</span>
      </div>
    </div>

    <!-- ÚLTIMOS TURNOS LLAMADOS -->
    <div class="w-2/5 bg-white/5 p-10 flex flex-col">
      <h3 class="text-2xl font-semibold mb-8 flex items-center gap-3">
        <i class="fa-solid fa-history"></i> Últimos turnos llamados
      </h3>
      <div id="last-called" class="space-y-6 flex-1"></div>

      <!-- MENSAJES INFORMATIVOS (REQ-29) -->
      <div class="mt-auto">
        <div class="bg-white/10 rounded-3xl p-6 text-sm leading-relaxed overflow-hidden">
          <div id="marquee" class="marquee whitespace-nowrap">
            📢 Recuerda traer tu documento • 💳 Pago con tarjeta disponible • 🕒 Horario de atención 8:00 - 17:00 • 
            ¡Gracias por su paciencia!
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let lastCalledData = [];

    async function loadWaitingScreen() {
      try {
        const res = await fetch('/api/estado');
        const data = await res.json();

        // Turno actual (usamos el primero de la cola o el último llamado)
        const current = data.queue && data.queue[0] 
          ? data.queue[0] 
          : (data.history && data.history[data.history.length-1]);

        if (current) {
          document.getElementById('current-ticket').textContent = current.id || '---';
          document.getElementById('current-service').textContent = current.serviceName || 'Atención general';
          document.getElementById('current-module').innerHTML = `Ventanilla <span class="font-mono">${current.module || '01'}</span>`;
        }

        // Últimos 5 turnos llamados
        const container = document.getElementById('last-called');
        container.innerHTML = (data.history || []).slice(-5).reverse().map(t => `
          <div class="flex justify-between items-center bg-white/10 rounded-2xl px-6 py-4">
            <div>
              <span class="font-mono text-3xl">${t.id}</span>
              <span class="ml-4 text-white/80">${t.serviceName}</span>
            </div>
            <div class="text-right">
              <span class="text-emerald-400 font-semibold">${t.calledAt || 'Ahora'}</span>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error("Error en pantalla de espera", e);
      }
    }

    function updateClock() {
      const timeEl = document.getElementById('current-time');
      setInterval(() => {
        const now = new Date();
        timeEl.textContent = now.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      }, 1000);
    }

    // Actualizar cada 4 segundos
    window.onload = () => {
      loadWaitingScreen();
      setInterval(loadWaitingScreen, 4000);
      updateClock();
    };
  </script>
</body>
</html>
