<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login • Turnos PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-950 to-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
    <h1 class="text-4xl font-bold text-center mb-8">Turnos PRO</h1>
    
    <input id="username" type="text" placeholder="Usuario (admin o asesor01)" 
           class="w-full px-6 py-5 rounded-2xl border mb-4 text-lg">
    <input id="password" type="password" placeholder="Contraseña" 
           class="w-full px-6 py-5 rounded-2xl border mb-6 text-lg">

    <button onclick="login()" 
            class="w-full py-5 bg-blue-600 text-white text-xl font-semibold rounded-3xl">
      Iniciar sesión
    </button>

    <p class="text-center text-sm mt-6 text-gray-500">
      Demo:<br>
      admin / admin123<br>
      asesor01 / 1234
    </p>
  </div>

  <script>
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (data.success) {
        window.location.href = data.redirect;
      } else {
        alert(data.message || 'Error al iniciar sesión');
      }
    }
  </script>
</body>
</html>
